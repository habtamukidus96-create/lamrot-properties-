<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamrot Properties | Luxury Real Estate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Base Reset & Premium Dark-Glow Canvas */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #060709; 
            color: #f5f5f5;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }
        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        /* Fixed Navigation Header Layout */
        header {
            background: linear-gradient(180deg, rgba(11, 12, 16, 0.98) 0%, rgba(6, 7, 9, 0.94) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(15px);
        }
        
        /* Top Circle Icons Group */
        .top-left-socials {
            display: flex;
            gap: 10px;
        }
        .top-left-socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            color: #D4AF37;
            font-size: 0.9rem;
        }

        /* Branding Typography Logo */
        .logo-container {
            text-align: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 1.35rem;
            letter-spacing: 3px;
            color: #ffffff;
            text-transform: uppercase;
            line-height: 1.1;
        }
        .logo span {
            display: block;
            color: #D4AF37; 
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 4px;
        }
        
        /* Navigation Menu Toggle Button */
        .menu-btn {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 25px;
            height: 15px;
            cursor: pointer;
            z-index: 1001;
        }
        .menu-btn span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: #D4AF37;
        }

        /* Dropdown Interactive Mobile Drawer Links */
        .nav-links {
            display: flex;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background-color: rgba(6, 7, 9, 0.98);
            flex-direction: column;
            padding: 10px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
        }
        .nav-links.active {
            max-height: 300px;
            opacity: 1;
        }
        .nav-links a {
            padding: 16px 25px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: #cccccc;
        }

        /* Premium Graphic Hero Interface Layout */
        .hero-section {
            padding: 50px 20px 40px 20px;
            background: radial-gradient(circle at 50% 20%, #161a22 0%, #060709 75%);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        /* Floating Left Column Links */
        .profile-side-socials {
            display: flex;
            flex-direction: column;
            gap: 18px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.3);
            position: absolute;
            left: 20px;
            top: 60px;
            z-index: 10;
        }

        /* Double Rotating Glowing Gold Frame for Profile Picture */
        .profile-wrapper {
            position: relative;
            padding: 12px;
            margin-bottom: 30px;
            margin-left: 30px; 
            z-index: 5;
        }
        .profile-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1.5px solid rgba(212, 175, 55, 0.45);
            border-radius: 16px;
            transform: rotate(-4deg);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }
        .profile-frame-inner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            transform: rotate(4deg);
        }
        .headshot {
            width: 150px;
            height: 190px;
            object-fit: cover;
            border-radius: 10px;
            display: block;
            position: relative;
            z-index: 6;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* Glassmorphic Transparent Philosophy Frame */
        .philosophy-container {
            text-align: center;
            padding: 25px 20px;
            max-width: 460px;
            margin-top: 10px;
            background: rgba(22, 26, 34, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .philosophy-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        /* Curated Listings Headline Placement */
        .section-main-title {
            font-family: 'Cormorant Garamond', serif;
            text-align: center;
            padding: 50px 20px 10px 20px;
            font-size: 1.8rem;
            color: #ffffff;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .section-main-title::after {
            content: '';
            display: block;
            width: 45px;
            height: 1px;
            background-color: #D4AF37;
            margin: 12px auto 0 auto;
        }
        
        /* Card Structure & Visual Overlays Matrix */
        .listings-view-grid {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }
        .premium-property-card {
            background: linear-gradient(180deg, #11141a 0%, #060709 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        .property-media-wrapper {
            position: relative;
            width: 100%;
            height: 250px;
        }
        .property-media-asset {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .property-content-details {
            padding: 25px 20px;
            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            background: rgba(6, 7, 9, 0.4);
        }
        .property-card-category {
            font-size: 1.3rem;
            font-family: 'Cormorant Garamond', serif;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .property-card-price {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #D4AF37;
            margin-bottom: 10px;
        }
        .property-card-desc {
            font-size: 0.8rem;
            color: #8a92a6;
            font-weight: 300;
        }

        /* Horizontal/Stacked Features Banner Setup Box */
        .exclusive-features-section {
            padding: 40px 20px;
            background-color: #0b0c10;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            text-align: center;
        }
        .features-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #D4AF37;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .features-grid-stack {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 400px;
            margin: 0 auto;
        }
        .feature-item-box {
            padding-bottom: 5px;
        }
        .feature-item-icon {
            font-size: 1.5rem;
            color: #D4AF37;
            margin-bottom: 8px;
        }
        .feature-item-box h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #ffffff;
            margin-bottom: 4px;
        }
        .feature-item-box p {
            font-size: 0.8rem;
            color: #8a92a6;
            font-weight: 300;
        }

        /* Corporate Professional Profile Biography Panel */
        .corporate-about-section {
            background-color: #060709;
            padding: 55px 20px;
            text-align: center;
            position: relative;
        }
        .about-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .about-left-paragraph {
            font-size: 0.85rem;
            color: #cccccc;
            max-width: 460px;
            margin: 0 auto;
            line-height: 1.7;
            font-weight: 300;
            text-align: justify;
        }

        /* Interaction Navigation & Action Contacts Panel */
        footer {
            background-color: #060709;
            padding: 50px 20px 30px 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

            margin-bottom:
