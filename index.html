<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamrot Properties | Luxury Real Estate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Base Reset & Luxury System Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #0b0c10; /* Deep Luxury Obsidian Dark */
            color: #f5f5f5;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }
        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        /* 1 & 2. Modern Navigation Bar Header Layout */
        header {
            background-color: rgba(11, 12, 16, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(10px);
        }
        
        /* Gold Circular Top Left Social Icons Array */
        .top-left-socials {
            display: flex;
            gap: 12px;
        }
        .top-left-socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            color: rgba(212, 175, 55, 0.8);
            font-size: 0.9rem;
        }
        .top-left-socials a:hover {
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* Clean Branding Typography (Amharic Tagline Removed) */
        .logo-container {
            text-align: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            line-height: 1.2;
        }
        .logo span {
            display: block;
            color: #D4AF37; /* Gold Accent for PROPERTIES text line */
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 3px;
        }
        
        /* Interactive Right Navigation Menu Button */
        .menu-btn {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 26px;
            height: 15px;
            cursor: pointer;
            z-index: 1001;
        }
        .menu-btn span {
            display: block;
            height: 1.5px;
            width: 100%;
            background-color: rgba(212, 175, 55, 0.8);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        /* Transforming Mobile Menu Hamburger To Closing Cross Mark */
        .menu-btn.open span:nth-child(1) {
            transform: translateY(6.5px) rotate(45deg);
        }
        .menu-btn.open span:nth-child(2) {
            opacity: 0;
        }
        .menu-btn.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* Dropdown Interactive Navigation Box Drawer Overlay */
        .nav-links {
            display: flex;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background-color: rgba(11, 12, 16, 0.98);
            flex-direction: column;
            padding: 10px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
        }
        .nav-links.active {
            max-height: 300px;
            opacity: 1;
        }
        .nav-links a {
            padding: 18px 25px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-weight: 400;
            color: #cccccc;
        }
        .nav-links a:hover {
            color: #D4AF37;
            background-color: rgba(212, 175, 55, 0.02);
        }

        /* 3. Main Luxury Presentation Grid Hero Layout */
        .hero-section {
            padding: 40px 20px;
            background: radial-gradient(circle at top, #161a22 0%, #0b0c10 70%);
            position: relative;
        }
        .hero-layout-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        
        /* Double Rounded Elegant Border Gold Accent Framing for Headshot Profile */
        .profile-wrapper {
            position: relative;
            padding: 10px;
            display: inline-block;
        }
        .profile-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            transform: rotate(-3deg);
            pointer-events: none;
        }
        .profile-frame-inner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            transform: rotate(3deg);
            pointer-events: none;
        }
        .headshot {
            width: 160px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Profile Left Multi-Linked Elegant Blended Social Icons Stack */
        .profile-side-socials {
            display: flex;
            flex-direction: column;
            gap: 16px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.35); /* Elegant Blended Aesthetic */
            position: absolute;
            left: 15px;
            top: 80px;
        }
        .profile-side-socials a:hover {
            color: #D4AF37;
            transform: translateX(2px);
        }

        /* Hero Philosophical Content Copy Elements */
        .philosophy-container {
            text-align: center;
            padding: 0 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        .philosophy-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.7;
        }

        /* Custom Elegant Corporate Core Features Block Layout Grid Matrix */
        .exclusive-features-section {
            padding: 30px 20px;
            text-align: center;
        }
        .features-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: #D4AF37;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .features-grid-stack {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 400px;
            margin: 0 auto;
        }
        .feature-item-box {
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 20px;
        }
        .feature-item-box:last-child {
            border-bottom: none;
        }
        .feature-item-icon {
            font-size: 1.5rem;
            color: #D4AF37;
            margin-bottom: 8px;
        }
        .feature-item-box h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .feature-item-box p {
            font-size: 0.75rem;
            color: #8a92a6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 4. Luxury Portfolio List Block Presentation Section Title Styling */
        .section-main-title {
            font-family: 'Cormorant Garamond', serif;
            text-align: center;
            padding: 40px 20px 10px 20px;
            font-size: 1.75rem;
            color: #D4AF37;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .listings-view-grid {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }
        .premium-property-card {
            background: linear-gradient(180deg, #11141a 0%, #0b0c10 100%);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }
        .property-media-wrapper {
            position: relative;
            width: 100%;
            height: 260px;
            background-color: #161920;
        }
        .property-media-asset {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Content Panel Layout Matrix for Cards */
        .property-content-details {
            padding: 25px 20px;
            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
        }
        .property-card-category {
            font-size: 1.15rem;
            font-family: 'Cormorant Garamond', serif;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .property-card-price {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: #D4AF37;
            margin-bottom: 8px;
        }
        .property-card-desc {
            font-size: 0.8rem;
            color: #8a92a6;
            letter-spacing: 0.5px;
        }

        /* 4. Corporate About Us Bio Panel */
        .corporate-about-section {
            background-color: #11141a;
            padding: 50px 20px;
            margin-top: 20px;
            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .about-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .about-content-flex {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        .about-left-paragraph {
            font-size: 0.85rem;
            color: #cccccc;
            max-width: 450px;
            line-height: 1.8;
            text-align: justify;
        }

        /* Interactive Footer & Traversal Quick-Links Protocol Panel */
        footer {
            background-color: #0b0c10;
            padding: 45px 20px 30px 20px;
            text-align: center;
        }
        .footer-action-contacts {
            margin-bottom: 35px;
        }
        .footer-action-contacts a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            color: #e5e5e5;
            width: 100%;
        }
        .footer-action-contacts i {
            color: #D4AF37;
            margin-right: 12px;
            font-size: 1.1rem;
        }
        
        /* Secondary Traversal Navigation Matrices Link Layout */
        .footer-quick-traversal {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            padding-top: 25px;
            padding-right: 25px;
            font-size: 1rem;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.7);
        }
        .footer-quick-traversal a:hover {
            color: #D4AF37;
        }
        .footer-brand-label {
            text-align: left;
            font-size: 0.75rem;
            color: #555555;
            margin-top: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
