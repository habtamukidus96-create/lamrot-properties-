<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lamrot Properties</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    /* Reset and Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background-color: #0b0c10; /* Obsidian Black */
      color: #ffffff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow-x: hidden; /* Strictly prevents horizontal shifting/empty side spaces */
      width: 100%;
    }

    /* NAVBAR CODE */
    .navbar {
      background-color: #0b0c10;
      border-bottom: 1px solid rgba(197, 168, 128, 0.2); 
      padding: 15px 20px;
      position: relative;
      width: 100%;
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .logo-brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* Social Media Icons Style */
    .social-icons {
      display: flex;
      gap: 8px;
    }

    .social-icons a {
      color: #c5a880; /* Gold */
      text-decoration: none;
      font-size: 13px;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(197, 168, 128, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    /* Logo Text styling */
    .logo-text h1 {
      font-size: 18px;
      letter-spacing: 2px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
    }

    .logo-text h2 {
      font-size: 10px;
      letter-spacing: 3px;
      color: #c5a880; /* Premium Gold */
      font-weight: 400;
      margin-top: 2px;
    }

    .amharic-sub {
      font-size: 10px;
      color: #8b8e96; 
      display: block;
      margin-top: 2px;
    }

    /* Hide the technical checkbox logic */
    .menu-toggle {
      display: none;
    }

    /* Desktop Menu Links */
    .nav-links a {
      color: #ffffff;
      text-decoration: none;
      margin-left: 25px;
      font-size: 13px;
      letter-spacing: 1.5px;
      font-weight: 500;
    }

    /* Desktop Hamburger - Hidden by default */
    .hamburger {
      display: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 25px;
      height: 3px;
      background-color: #c5a880;
      border-radius: 2px;
      transition: 0.3s;
    }

    /* HERO SECTION / BODY CONTENT */
    .hero-section {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hero-image-container {
      position: relative;
      border: 1px solid rgba(197, 168, 128, 0.3);
      padding: 10px;
      border-radius: 16px;
      margin-bottom: 25px;
      display: inline-block;
    }

    .hero-img {
      width: 100%;
      max-width: 280px;
      border-radius: 12px;
      display: block;
    }

    .main-headline {
      font-size: 22px;
      line-height: 1.6;
      margin-bottom: 20px;
      font-weight: 600;
      max-width: 450px;
    }

    .quote-box {
      border: 1px solid rgba(197, 168, 128, 0.2);
      padding: 15px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.01);
      max-width: 380px;
    }

    .quote-text {
      font-style: italic;
      color: #c5a880;
      font-size: 14px;
    }

    /* =========================================================
       MOBILE RESPONSIVE BREAKPOINT
       ========================================================= */
    @media screen and (max-width: 768px) {
      
      /* Show the 3 dashes menu button */
      .hamburger {
        display: flex;
        z-index: 100;
      }

      /* Move links into a hidden dropdown menu */
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background-color: #0b0c10;
        border-bottom: 1px solid rgba(197, 168, 128, 0.2);
        padding: 20px 0;
        text-align: center;
        z-index: 99;
      }

      .nav-links a {
        margin: 15px 0;
        display: block;
        font-size: 16px;
        letter-spacing: 2px;
      }

      /* When 3 dashes are tapped, reveal the dropdown menu */
      .menu-toggle:checked ~ .nav-links {
        display: flex;
      }
      
      /* Animates 3 dashes into an 'X' when clicked */
      .menu-toggle:checked ~ .hamburger span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 6px);
      }
      .menu-toggle:checked ~ .hamburger span:nth-child(2) {
        opacity: 0;
      }
      .menu-toggle:checked ~ .hamburger span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -6px);
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      
      <div class="logo-brand">
        <div class="social-icons">
          <a href="#"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-tiktok"></i></a>
          <a href="#"><i class="fab fa-telegram-plane"></i></a>
        </div>
        <div class="logo-text">
          <h1>LAMROT</h1>
          <h2>PROPERTIES</h2>
          <span class="amharic-sub">የቀን ጌታና</span>
        </div>
      </div>

      <input type="checkbox" id="menu-toggle" class="menu-toggle">
      
      <label for="menu-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <nav class="nav-links">
        <a href="#">HOME</a>
        <a href="#">LISTINGS</a>
        <a href="#">ABOUT US</a>
      </nav>
      
    </div>
  </header>

  <main class="hero-section">
    <div class="hero-image-container">
      <img src="mititi.jpg" alt="Lamrot Properties Professional" class="hero-img">
    </div>
    
    <div class="hero-content">
      <h2 class="main-headline">ጥራት ያላቸው የመኖሪያና የንግድ ቤቶችን ዛሬውኑ ያግኙ!</h2>
      <div class="quote-box">
        <p class="quote-text">"Philosophy is the philosophy of ensuring the luxury of your life."</p>
      </div>
    </div>
  </main>

</body>
</html>
