<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamrot Properties | Luxury Real Estate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Base Reset & Premium Dark Canvas Gradient */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #060709; 
            color: #f5f5f5;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* Fixed Navigation Header Layout */
        header {
            background: linear-gradient(180deg, rgba(11, 12, 16, 0.98) 0%, rgba(6, 7, 9, 0.94) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 60px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        
        /* Top Left Social Icons Group */
        .top-left-socials {
            display: flex;
            gap: 12px;
        }
        .top-left-socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            color: #D4AF37;
            font-size: 0.95rem;
            background: rgba(6, 7, 9, 0.4);
            transition: all 0.3s ease;
        }
        .top-left-socials a:hover {
            border-color: #ffffff;
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* Branding Typography Logo matching best.png layout */
        .logo-container {
            text-align: center;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: #ffffff;
            text-transform: uppercase;
            line-height: 1.1;
        }
        .logo span {
            display: block;
            color: #D4AF37; 
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 5px;
            margin-top: 2px;
        }
        .logo-subtitle {
            font-size: 0.75rem;
            color: #8a92a6;
            letter-spacing: 2px;
            margin-top: 4px;
            font-weight: 400;
        }
        
        /* Desktop Right Navigation Menu Links */
        .nav-links {
            display: flex;
            gap: 30px;
        }
        .nav-links a {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #cccccc;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: #D4AF37;
        }

        /* Premium Desktop Hero Row Grid */
        .hero-section {
            padding: 80px 10%);
            background: radial-gradient(circle at 50% 20%, #161a22 0%, #060709 75%);
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
        }

        /* Headshot placement on Left Side */
        .hero-left-block {
            flex: 0 0 auto;
        }
        /* Double Rotating Glowing Frame matching graphics */
        .profile-wrapper {
            position: relative;
            padding: 12px;
            width: 260px;
            height: 330px;
        }
        .profile-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(212, 175, 55, 0.45);
            border-radius: 16px;
            transform: rotate(-4deg);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
        }
        .profile-frame-inner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            transform: rotate(4deg);
        }
        .headshot {
            width: 236px;
            height: 306px;
            object-fit: cover;
            border-radius: 10px;
            display: block;
            position: relative;
            z-index: 6;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }

        /* Typography Text Blocks on Right Side */
        .hero-right-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            text-align: left;
        }
        .hero-amharic-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 1px;
            line-height: 1.4;
        }
        /* Glassmorphic Transparent Editorial Panel */
        .philosophy-container {
            padding: 30px;
            width: 100%;
            max-width: 600px;
            background: rgba(22, 26, 34, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .philosophy-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-style: italic;
            color: rgba(212, 175, 55, 0.95);
            line-height: 1.6;
        }

        /* Title Design Setup */
        .section-main-title {
            font-family: 'Cormorant Garamond', serif;
            text-align: center;
            padding: 80px 20px 20px 20px;
            font-size: 2.4rem;
            color: #ffffff;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .section-main-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background-color: #D4AF37;
            margin: 15px auto 0 auto;
        }
        
        /* 3-Column Grid Layout for Side-by-Side Properties */
        .listings-view-grid {
            padding: 40px 10%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }
        .premium-property-card {
            background: linear-gradient(180deg, #11141a 0%, #060709 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.18);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s ease, border-color 0.4s ease;
        }
        .premium-property-card:hover {
            transform: translateY(-10px);
            border-color: rgba(212, 175, 55, 0.5);
        }
        .property-media-wrapper {
            position: relative;
            width: 100%;
            height: 280px;
            background-color: #11141a;
        }
        .property-media-asset {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.15
